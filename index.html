<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Point 42 | Interior Hall</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; }
        
        #hall {
            width: 100%;
            height: 100vh;
            /* Вот тут магия: картинка повторяется по горизонтали */
            background-image: url('images/hall1.png');
            background-repeat: repeat-x;
            background-size: auto 100%; /* Растягиваем плитку по высоте экрана */
            background-position: 0px 0px;
            cursor: grab;
        }

        #hall:active { cursor: grabbing; }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #f2cf07;
            padding: 10px;
            font-family: monospace;
            pointer-events: none; /* Чтобы не мешало кликать по залу */
        }
    </style>
</head>
<body>

    <div id="hall"></div>
    <div class="ui-overlay">LOCATION: MAIN LOBBY | USE MOUSE TO LOOK AROUND</div>

    <script>
        const hall = document.getElementById('hall');
        let isDragging = false;
        let startX;
        let scrollLeft;
        let currentPos = 0;

        hall.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const x = e.pageX;
            const walk = (x - startX) * 1.5; // Скорость поворота
            currentPos += walk;
            startX = x; // Обновляем точку старта для плавности
            
            // Сдвигаем фон
            hall.style.backgroundPosition = `${currentPos}px 0px`;
        });
    </script>
</body>
</html>
