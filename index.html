<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point 42 | Online</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; }
        
        #viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
        }

        #hall-wall {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Твоя новая стена */
            background-image: url('images/hall1.png');
            background-repeat: repeat-x;
            background-size: auto 100%;
            will-change: transform;
        }

        #door-object {
            position: absolute;
            top: 53%; /* Чуть припустил вниз для центровки */
            left: 0;
            transform: translate(-50%, -50%);
            height: 75%; 
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #f2cf07;
            color: #f2cf07;
            padding: 10px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="hall-wall">
            <img src="images/door_maintenance.png" id="door-object" alt="Maintenance Door">
        </div>
        <div class="ui-overlay">
            Sector: Concourse | Auth: Piranio | Status: Active
        </div>
    </div>

    <script>
        const wall = document.getElementById('hall-wall');
        const door = document.getElementById('door-object');
        
        let isDragging = false;
        let startX;
        let currentPos = 0;
        
        // Настройка: через сколько пикселей стена повторяется? 
        // Если стена слишком часто или редко, поменяй это число (ширина твоей картинки hall1.png)
        const roomCircumference = 3000; 

        function updatePositions() {
            // Зацикливаем позицию, чтобы не крутить до бесконечности
            // Теперь значение всегда будет в пределах от 0 до roomCircumference
            let wrappedPos = currentPos % roomCircumference;
            
            wall.style.backgroundPosition = `${wrappedPos}px 0px`;
            
            // Ставим дверь ровно посередине одного из циклов
            door.style.left = `${wrappedPos + (roomCircumference / 2)}px`;
        }

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const x = e.pageX;
            currentPos += (x - startX);
            startX = x;
            updatePositions();
        });

        updatePositions();
    </script>
</body>
</html>
