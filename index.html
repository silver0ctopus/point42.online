<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point 42 | Online</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            height: 100%; 
            background: #000;
        }

        /* Контейнер для всего зала */
        #viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
        }

        #viewport:active { cursor: grabbing; }

        /* Сама стена, которая крутится */
        #hall-wall {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/hall1.png');
            background-repeat: repeat-x;
            background-size: auto 100%;
            background-position: 0px 0px;
            will-change: background-position;
        }

        /* Объект двери */
        #door-object {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Центрируем */
            height: 70%; /* Размер двери относительно высоты экрана */
            pointer-events: auto; /* Чтобы на неё можно было кликнуть в будущем */
        }

        .ui-overlay {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #f2cf07;
            color: #f2cf07;
            padding: 10px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="hall-wall">
            <!-- Дверь находится внутри стены, чтобы двигаться вместе с фоном -->
            <img src="images/door_maintenance.png" id="door-object" alt="Security Door">
        </div>
        <div class="ui-overlay">
            Sector: Concourse | Auth: Piranio | Status: Active
        </div>
    </div>

    <script>
        const wall = document.getElementById('hall-wall');
        const door = document.getElementById('door-object');
        
        let isDragging = false;
        let startX;
        let currentPos = 0;
        
        // Настройки: можно подкрутить, если дверь "уезжает" не туда
        const doorOffset = 500; // Позиция двери в пикселях от начала

        function updatePositions() {
            wall.style.backgroundPosition = `${currentPos}px 0px`;
            // Двигаем дверь синхронно с фоном
            door.style.left = `calc(50% + ${currentPos}px)`;
        }

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const x = e.pageX;
            const walk = (x - startX); 
            currentPos += walk;
            startX = x;
            
            updatePositions();
        });

        // Первоначальная установка
        updatePositions();
    </script>
</body>
</html>
