<!DOCTYPE html>
<html lang="ru">
<head>
    
    <title>Point 42 - Лобби Космопорта</title>
    <!-- A-Frame (основной) -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    
    
</head>
<body>

    <div id="msg-panel" class="info-panel"></div>

    <a-scene background="color: #050505" physics="debug: false;">
        
        <a-assets>
            <!-- Здесь можно будет добавить текстуры стен или пола -->
        </a-assets>

        <!-- 1. ЦЕНТР: СТОЙКА РЕГИСТРАЦИИ -->
        <a-entity position="0 0 0">
            <a-cylinder static-body radius="1.8" height="4" color="#333" metalness="0.5"></a-cylinder>
            <a-cylinder static-body radius="1.85" height="0" position="0 0.5 0" color="#0ff" opacity="0.5"></a-cylinder>
            
        <!-- 2. СТЕНЫ ВОСЬМИУГОЛЬНИКА -->
        <!-- Каждая стена удалена от центра на 7 метров -->
        
        <!-- Стена 1: Лифт (Выход) -->
    <a-entity rotation="0 0 0">
        <a-plane position="0 3.5 -12" width="10" height="7" color="#2a2a2a">
            <a-plane id="door1" position="0 -1 0.01" width="3" height="5" color="#AAA" 
            material="metalness: 0.8; roughness: 0.2"></a-plane>
        
            <!-- Двери -->
            <a-plane id="left-door1" position="-0.75 -1 0.02" width="1.5" height="5" color="rgb(255,0,0)"></a-plane>
            <a-plane id="right-door1" position="0.75 -1 0.02" width="1.5" height="5" color="rgb(255,0,0)"></a-plane>
        
            <!-- Панели, куда прячутся двери -->
            <a-plane id="left-door-hide1" position="-2.25 -1 0.03" width="1.5" height="5" color="#2a2a2a"></a-plane>
            <a-plane id="right-door-hide1" position="2.25 -1 0.03" width="1.5" height="5" color="#2a2a2a"></a-plane>
        
            <!-- Исправленная кнопка -->
            <a-circle class="clickable door-button" 
            position="2.2 -1 0.04" radius="0.1" color="red"
            data-left="left-door1" 
            data-right="right-door1" 
            data-url="index.html">
            </a-circle> 

            <a-text value="EXIT" align="center" position="0 2 0.01" width="6" side="double"></a-text>
        </a-plane>
    </a-entity>

        <!-- Стена 2: Телевизор и Газеты -->
        <a-entity rotation="0 45 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#2a2a2a">
                <a-box id="tv" class="clickable" position="-1.5 0.5 0.2" width="2" height="1.2" color="#000" 
                onclick="interact('Экран: Чтение Манифеста...')"></a-box>
                <a-box id="news" class="clickable" position="1.5 -0.5 0.2" width="1.2" height="0.8" color="#5a3a22" 
                onclick="interact('Стенд: Свежая пресса получена.')"></a-box>
            </a-plane>
        </a-entity>

        <!-- Стена 3: Жилой отсек -->
        <a-entity rotation="0 90 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#222" class="clickable" 
            onclick="checkAccess('Жилой отсек')">
                <a-text value="ЖИЛОЙ ОТСЕК" align="center" position="0 0 0.1" width="6"></a-text>
            </a-plane>
        </a-entity>

        <!-- Стена 4: Администрация -->
        <a-entity rotation="0 135 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#222" class="clickable" 
            onclick="checkAccess('Администрация')">
                <a-text value="АДМИНИСТРАЦИЯ" align="center" position="0 0 0.1" width="6"></a-text>
            </a-plane>
        </a-entity>

        <!-- Стена 5: Внешний мир (Ворота) -->
        <a-entity rotation="0 180 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#111" class="clickable" 
            onclick="interact('ВНИМАНИЕ: Идут работы по терраформированию!')">
                <a-text value="ВНЕШНИЙ МИР" align="center" position="0 0 0.1" width="6" color="red"></a-text>
            </a-plane>
        </a-entity>

        <!-- Стена 6: Молл -->
        <a-entity rotation="0 225 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#2a2a2a">
                <a-plane id="door6" position="0 -1 0.01" width="3" height="5" color="#AAA" 
                material="metalness: 0.8; roughness: 0.2"></a-plane>
            
                <!-- Двери -->
                <a-plane id="left-door6" position="-0.75 -1 0.02" width="1.5" height="5" color="rgb(255,0,0)"></a-plane>
                <a-plane id="right-door6" position="0.75 -1 0.02" width="1.5" height="5" color="rgb(255,0,0)"></a-plane>
            
                <!-- Панели, куда прячутся двери -->
                <a-plane id="left-door-hide6" position="-2.25 -1 0.03" width="1.5" height="5" color="#2a2a2a"></a-plane>
                <a-plane id="right-door-hide6" position="2.25 -1 0.03" width="1.5" height="5" color="#2a2a2a"></a-plane>
            
                <!-- Исправленная кнопка -->
                <a-circle class="clickable door-button" 
                position="2.2 -1 0.04" radius="0.1" color="red"
                data-left="left-door6" 
                data-right="right-door6" 
                data-url="mall.html">
                </a-circle> 
    
                <a-text value="MALL" align="center" position="0 2 0.01" width="6" side="double"></a-text>
            </a-plane>
        </a-entity>

        <!-- Стена 7: Технические помещения -->
        <a-entity rotation="0 270 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#222" class="clickable" 
            onclick="checkAccess('Тех. помещения')">
                <a-text value="ТЕХ-ЗОНА" align="center" position="0 0 0.1" width="6"></a-text>
            </a-plane>
        </a-entity>

        <!-- Стена 8: Банкомат -->
        <a-entity rotation="0 315 0">
            <a-plane position="0 3.5 -12" width="10" height="7" color="#2a2a2a">
                <a-box id="atm" class="clickable" position="0 0 0.2" width="1" height="1.8" color="#333" 
                onclick="interact('Банкомат: Временно не работает.')">
                    <a-plane position="0 0.4 0.51" width="0.8" height="0.4" color="#0ff"></a-plane>
                </a-box>
            </a-plane>
        </a-entity>

        <!-- ПОЛ -->
        <a-circle static-body="shape: mesh" 
          rotation="-90 0 0" 
          radius="13" 
          color="#BDB76B" 
          metalness="0.2" 
          roughness="0.8">
        </a-circle>

        <!-- СВЕТ -->
        <a-light type="ambient" color="#555"></a-light>
        <a-light type="point" position="0 4 0" intensity="1" color="#0ff"></a-light>

        <!-- КАМЕРА -->
        <a-entity id="rig" circular-boundary="radius: 11.2">
            <!--wasd-controls теперь на rig, чтобы не было "тряски" при столкновении -->
            <a-entity camera 
                      position="0 3 0" 
                      look-controls="pointerLockEnabled: true" 
                      wasd-controls="acceleration: 65">
                
                <!-- КУРСОР-ПЕРЕКРЕСТИЕ -->
                <a-entity cursor="fuse: false;"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.00; radiusOuter: 0.01"
                          material="color: white; shader: flat"
                          raycaster="objects: .clickable">
                        <!-- Анимация при наведении на .clickable -->
                            <a-animation begin="mouseenter" easing="ease-in" attribute="scale"
                            fill="forwards" from="1 1 1" to="1.5 1.5 1.5" dur="150"></a-animation>
                        <!-- Анимация при уходе с объекта -->
                        <a-animation begin="mouseleave" easing="ease-in" attribute="scale"
                        fill="forwards" from="1.5 1.5 1.5" to="1 1 1" dur="150"></a-animation>
                </a-entity>
                
            </a-entity>
        </a-entity>

    </a-scene>

    <!-- Игровой HUD (Верхний слой) -->
<div id="game-hud">
    <!-- Блок игрока в правом верхнем углу -->
    <div class="player-status-block" id="hud-avatar-btn" title="Открыть инвентарь (I)">
      <div class="avatar-frame">
        <!-- Здесь позже будет <img> с аватаркой -->
        <div class="avatar-placeholder"></div>
      </div>
      <div class="player-name" id="hud-player-name">Загрузка...</div>
      <!-- Место для будущего прогресс-бара здоровья -->
      <div class="health-bar-container-placeholder"></div>
    </div>
  </div>
  
  <!-- Модальное окно информации об игроке (Инвентарь) -->
  <div id="inventory-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="close-btn" id="close-inventory-btn">&times;</button>
      
      <h2>Информация о игроке</h2>
      <div class="player-info-detailed">
        <div class="avatar-frame large">
          <div class="avatar-placeholder"></div>
        </div>
        <div class="player-details">
          <h3 id="modal-player-name">Имя Игрока</h3>
          <p>Статус: В сети</p>
          <p>Локация: Лобби</p>
          <!-- Здесь позже будет снаряжение -->
        </div>
      </div>
    </div>
  </div>

<script src="js/app.js" type="module"></script>    

</body>
</html>
