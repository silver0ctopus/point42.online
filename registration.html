<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Point 42 - Регистрация</title>
    <!-- Подключаем Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: monospace; background: #050505; color: #00ff00; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .overlay-card { background: #111; border: 2px solid #00ff00; padding: 20px; width: 300px; box-shadow: 0 0 20px #00ff00; }
        h2 { text-align: center; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #008800; }
        #status { margin-top: 10px; font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>

<div class="overlay-card">
    <h2>Регистрация терминала</h2>
    <input type="text" id="reg-login" placeholder="ПОЗЫВНОЙ (LOGIN)">
    <input type="email" id="reg-email" placeholder="E-MAIL">
    <input type="password" id="reg-password" placeholder="ПАРОЛЬ">
    <input type="password" id="reg-password-confirm" placeholder="ПОДТВЕРДИТЕ ПАРОЛЬ">
    
    <button onclick="signUp()">Зарегистрироваться</button>
    <div id="status"></div>
</div>

<script>
    // 1. Проверяем, не объявлен ли клиент ранее, и инициализируем его
    const SUPABASE_URL = 'https://hjgeubtprprvnmszjbaj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZ2V1YnRwcnBydm5tc3pqYmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NTEyMTUsImV4cCI6MjA5NDMyNzIxNX0.j5WdnROT426wTMzjI6kMWhrU_pnPqteIboGK6km2pn0'; // <-- не забудь вставить свой ключ вместо этого текста
    
    // Используем window.supabaseClient, чтобы точно избежать конфликтов имен с SDK
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Сама функция регистрации
    async function signUp() {
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    const passwordConfirm = document.getElementById('reg-password-confirm').value; // Берем значение второго поля
    const login = document.getElementById('reg-login').value;
    const status = document.getElementById('status');

    // 1. Базовая проверка на заполнение
    if (!email || !password || !login) {
        status.innerText = "Ошибка: Заполни все поля терминала!";
        return;
    }

    // 2. ПРОВЕРКА СОВПАДЕНИЯ ПАРОЛЕЙ
    if (password !== passwordConfirm) {
        status.innerText = "Ошибка: Пароли не совпадают!";
        status.style.color = "#ff0000"; // Можно подсветить красным для важности
        return;
    }

    // 3. Проверка длины пароля (Supabase по умолчанию требует минимум 6 символов)
    if (password.length < 6) {
        status.innerText = "Ошибка: Пароль слишком короткий (мин. 6 симв.)";
        return;
    }

    status.style.color = "#00ff00";
    status.innerText = "Инициализация протокола связи...";

    try {
        // ... далее идет твой существующий код window.supabaseClient.auth.signUp ...
        const { data, error } = await window.supabaseClient.auth.signUp({
            email: email,
            password: password,
        });
        
        // ... и запись в таблицу profiles ...
        if (error) {
            status.innerText = "Ошибка Auth: " + error.message;
            return;
        }

        if (data.user) {
            const { error: profileError } = await window.supabaseClient
                .from('profiles')
                .insert([{ id: data.user.id, login: login, email: email }]);

            if (profileError) {
                status.innerText = "Ошибка БД: " + profileError.message;
            } else {
                status.innerText = "Гражданин успешно зарегистрирован в Point 42!";
            }
        }
    } catch (err) {
        status.innerText = "Критический сбой: " + err.message;
    }
}
</script>

</body>
</html>
